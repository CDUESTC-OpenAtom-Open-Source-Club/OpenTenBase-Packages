name: Test All Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to test (default: latest)'
        required: false
        default: ''
        type: string

jobs:
  test-deb:
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          # v5.0 - all distros
          - name: ubuntu-20.04-v5.0
            container: ubuntu:20.04
            codename: focal
            version: "5.0"
          - name: ubuntu-22.04-v5.0
            container: ubuntu:22.04
            codename: jammy
            version: "5.0"
          - name: ubuntu-24.04-v5.0
            container: ubuntu:24.04
            codename: noble
            version: "5.0"
          - name: ubuntu-25.04-v5.0
            container: ubuntu:25.04
            codename: plucky
            version: "5.0"
          - name: debian-11-v5.0
            container: debian:bullseye
            codename: bullseye
            version: "5.0"
          - name: debian-12-v5.0
            container: debian:bookworm
            codename: bookworm
            version: "5.0"
          - name: debian-13-v5.0
            container: debian:trixie
            codename: trixie
            version: "5.0"
          # v2.6.0 - representative distros
          - name: ubuntu-22.04-v2.6.0
            container: ubuntu:22.04
            codename: jammy
            version: "2.6.0"
          - name: debian-12-v2.6.0
            container: debian:bookworm
            codename: bookworm
            version: "2.6.0"
          # v2.5.0 - representative distros
          - name: ubuntu-22.04-v2.5.0
            container: ubuntu:22.04
            codename: jammy
            version: "2.5.0"
          - name: debian-12-v2.5.0
            container: debian:bookworm
            codename: bookworm
            version: "2.5.0"

    name: DEB ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ${{ matrix.container }}

    steps:
      - name: Install deps
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y sudo procps libatomic1 adduser curl
          apt-get install -y libreadline8 libxml2 libcurl4 libpam0g liblz4-1 libzstd1 2>/dev/null || true
          apt-get install -y libssl3 2>/dev/null || apt-get install -y libssl1.1 2>/dev/null || true
          apt-get install -y libldap-2.5-0 2>/dev/null || apt-get install -y libldap-2.4-2 2>/dev/null || true
          apt-get install -y libsasl2-2 2>/dev/null || true

      - name: Download packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
          MATRIX_CODENAME: ${{ matrix.codename }}
          MATRIX_VERSION: ${{ matrix.version }}
        run: |
          TAG="$INPUT_TAG"
          if [ -z "$TAG" ]; then
            TAG=$(curl -sL "https://api.github.com/repos/${{ github.repository }}/releases/latest" | grep '"tag_name"' | sed 's/.*"tag_name": *"//' | sed 's/".*//')
          fi
          echo "Downloading from release: $TAG (version=$MATRIX_VERSION)"
          mkdir -p /tmp/debs
          cd /tmp/debs
          # Download DEB packages matching this codename AND version
          curl -sL "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | \
            grep -o '"browser_download_url": *"[^"]*\.deb"' | \
            sed 's/"browser_download_url": *"//' | sed 's/"$//' | \
            grep "$MATRIX_CODENAME" | \
            grep "_${MATRIX_VERSION}-" | \
            while read url; do curl -sLO "$url"; done
          ls -la /tmp/debs/

      - name: Install packages
        env:
          MATRIX_VERSION: ${{ matrix.version }}
        run: |
          if ls /tmp/debs/*.deb 1>/dev/null 2>&1; then
            dpkg --force-depends -i /tmp/debs/*.deb
            mkdir -p "/usr/lib/opentenbase/${MATRIX_VERSION}/lib/postgresql"
            ldconfig || true
          else
            echo "ERROR: No .deb packages found"
            exit 1
          fi

      - name: Verify installation
        env:
          MATRIX_VERSION: ${{ matrix.version }}
        run: |
          echo "=== Installed packages ==="
          dpkg -l | grep opentenbase || true
          echo "=== Binary check (version $MATRIX_VERSION) ==="
          ls -la "/usr/lib/opentenbase/${MATRIX_VERSION}/bin/initgtm" 2>&1 || echo "initgtm NOT FOUND"
          ls -la "/usr/lib/opentenbase/${MATRIX_VERSION}/bin/postgres" 2>&1 || echo "postgres NOT FOUND"
          file "/usr/lib/opentenbase/${MATRIX_VERSION}/bin/initgtm" 2>&1 || true
          ldd "/usr/lib/opentenbase/${MATRIX_VERSION}/bin/initgtm" 2>&1 || true

      - name: Checkout test scripts
        uses: actions/checkout@v4

      - name: Run multi-node test
        env:
          OTB_VERSION: ${{ matrix.version }}
        run: |
          chmod +x test/multi-node-test.sh
          bash test/multi-node-test.sh

      - name: Run version switch test
        continue-on-error: true
        env:
          OTB_VERSION: ${{ matrix.version }}
        run: |
          chmod +x test/version-switch-test.sh
          bash test/version-switch-test.sh

      - name: Run advanced tests
        env:
          OTB_VERSION: ${{ matrix.version }}
        run: |
          chmod +x test/run-advanced-tests.sh
          bash test/run-advanced-tests.sh

  test-rpm:
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          # v5.0 - all distros
          - name: rocky-9-v5.0
            container: rockylinux:9
            pattern: rockylinux-9
            version: "5.0"
          - name: rocky-8-v5.0
            container: rockylinux:8
            pattern: rockylinux-8
            version: "5.0"
          - name: alma-9-v5.0
            container: almalinux:9
            pattern: almalinux-9
            version: "5.0"
          - name: alma-8-v5.0
            container: almalinux:8
            pattern: almalinux-8
            version: "5.0"
          - name: centos-stream-9-v5.0
            container: quay.io/centos/centos:stream9
            pattern: centos-stream-9
            version: "5.0"
          - name: fedora-40-v5.0
            container: fedora:40
            pattern: fedora-40
            version: "5.0"
          - name: openeuler-22.03-v5.0
            container: openeuler/openeuler:22.03
            pattern: openeuler-22.03
            version: "5.0"
          # v2.6.0 - representative distros
          - name: rocky-9-v2.6.0
            container: rockylinux:9
            pattern: rockylinux-9
            version: "2.6.0"
          - name: alma-9-v2.6.0
            container: almalinux:9
            pattern: almalinux-9
            version: "2.6.0"
          # v2.5.0 - representative distros
          - name: rocky-9-v2.5.0
            container: rockylinux:9
            pattern: rockylinux-9
            version: "2.5.0"
          - name: alma-9-v2.5.0
            container: almalinux:9
            pattern: almalinux-9
            version: "2.5.0"

    name: RPM ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ${{ matrix.container }}

    steps:
      - name: Install deps
        run: |
          # Install core packages one by one to avoid one failure blocking all
          PKGS="sudo procps-ng curl python3"
          for pkg in $PKGS; do
            dnf install -y "$pkg" 2>&1 || yum install -y "$pkg" 2>&1 || echo "WARN: failed to install $pkg"
          done

          # Install libatomic with fallback to gcc-libatomic (some distros use different package name)
          if ! dnf install -y libatomic 2>&1 && ! yum install -y libatomic 2>&1; then
            echo "WARN: libatomic package not found, trying gcc-libatomic..."
            dnf install -y gcc-libatomic 2>&1 || yum install -y gcc-libatomic 2>&1 || echo "WARN: failed to install libatomic"
          fi
          # Verify libatomic.so.1 exists
          find / -name "libatomic.so*" 2>/dev/null | head -5
          if ! ldconfig -p 2>/dev/null | grep -q libatomic; then
            echo "WARN: libatomic.so not found in ldconfig cache"
          fi

          # Install util-linux (provides runuser/setpriv)
          dnf install -y util-linux 2>&1 || yum install -y util-linux 2>&1 || echo "WARN: failed to install util-linux"

          # If no user-switching tool yet, try shadow-utils (provides su)
          if ! command -v sudo && ! command -v runuser && ! command -v setpriv && ! command -v su; then
            echo "No user-switching tool found, trying shadow-utils..."
            dnf install -y shadow-utils 2>&1 || yum install -y shadow-utils 2>&1 || echo "WARN: failed to install shadow-utils"
          fi

          # Verify at least one user-switching tool or python3 is available
          if ! command -v sudo && ! command -v runuser && ! command -v setpriv && ! command -v su && ! command -v python3; then
            echo "ERROR: no user-switching tool available"
            exit 1
          fi
          echo "Available tools:"
          command -v sudo || true
          command -v runuser || true
          command -v setpriv || true
          command -v su || true
          command -v python3 || true
          ldconfig || true

      - name: Download packages from release
        env:
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
          MATRIX_PATTERN: ${{ matrix.pattern }}
          MATRIX_VERSION: ${{ matrix.version }}
        run: |
          TAG="$INPUT_TAG"
          if [ -z "$TAG" ]; then
            TAG=$(curl -sL "https://api.github.com/repos/${{ github.repository }}/releases/latest" | grep '"tag_name"' | sed 's/.*"tag_name": *"//' | sed 's/".*//')
          fi
          echo "Downloading from release: $TAG (version=$MATRIX_VERSION)"
          mkdir -p /tmp/rpms
          cd /tmp/rpms
          # Download RPM packages matching this distro AND version (exclude debuginfo/debugsource)
          curl -sL "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | \
            grep -o '"browser_download_url": *"[^"]*\.rpm"' | \
            sed 's/"browser_download_url": *"//' | sed 's/"$//' | \
            grep "$MATRIX_PATTERN" | \
            grep "$(uname -m)" | \
            grep "${MATRIX_VERSION}" | \
            grep -v debuginfo | grep -v debugsource | \
            while read url; do curl -sLO "$url"; done
          ls -la /tmp/rpms/

      - name: Install packages
        env:
          MATRIX_VERSION: ${{ matrix.version }}
        run: |
          if ls /tmp/rpms/*.rpm 1>/dev/null 2>&1; then
            rpm -ivh /tmp/rpms/*.rpm --nodeps --force 2>&1 || true
            ldconfig || true
          else
            echo "ERROR: No .rpm packages found"
            exit 1
          fi

      - name: Verify installation
        env:
          MATRIX_VERSION: ${{ matrix.version }}
        run: |
          echo "=== Installed packages ==="
          rpm -qa | grep opentenbase || true
          echo "=== Binary check (version $MATRIX_VERSION) ==="
          ls -la "/usr/lib/opentenbase/${MATRIX_VERSION}/bin/initgtm" 2>&1 || echo "initgtm NOT FOUND"
          ls -la "/usr/lib/opentenbase/${MATRIX_VERSION}/bin/postgres" 2>&1 || echo "postgres NOT FOUND"
          file "/usr/lib/opentenbase/${MATRIX_VERSION}/bin/initgtm" 2>&1 || true
          ldd "/usr/lib/opentenbase/${MATRIX_VERSION}/bin/initgtm" 2>&1 || true

      - name: Checkout test scripts
        uses: actions/checkout@v4

      - name: Run multi-node test
        env:
          OTB_VERSION: ${{ matrix.version }}
        run: |
          chmod +x test/multi-node-test.sh
          bash test/multi-node-test.sh

      - name: Run version switch test
        continue-on-error: true
        env:
          OTB_VERSION: ${{ matrix.version }}
        run: |
          chmod +x test/version-switch-test.sh
          bash test/version-switch-test.sh

      - name: Run advanced tests
        env:
          OTB_VERSION: ${{ matrix.version }}
        run: |
          chmod +x test/run-advanced-tests.sh
          bash test/run-advanced-tests.sh
