name: Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., v5.0-runtime1)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/opentenbase-runtime

jobs:
  # ============================================================
  # Build and push Docker image to GHCR
  # ============================================================
  docker-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=${INPUT_TAG}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download and extract RPM packages
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Create extracted directory structure
          mkdir -p docker/runtime/extracted

          # Download openEuler 22.03 RPM from releases
          # Naming: opentenbase-{version}-1.openeuler-22.03-{version}-x86_64.x86_64.rpm
          RPM_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/opentenbase-5.0-1.openeuler-22.03-5.0-x86_64.x86_64.rpm"

          # If tag doesn't have RPM, try latest release
          if ! curl -sfL "$RPM_URL" -o /tmp/opentenbase.rpm; then
            echo "Tag RPM not found, fetching latest..."
            LATEST_TAG=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.tag_name')
            RPM_URL="https://github.com/${{ github.repository }}/releases/download/${LATEST_TAG}/opentenbase-5.0-1.openeuler-22.03-5.0-x86_64.x86_64.rpm"
            curl -sfL "$RPM_URL" -o /tmp/opentenbase.rpm || {
              echo "ERROR: No openEuler RPM found in releases"
              exit 1
            }
          fi

          echo "Extracting RPM to docker/runtime/extracted/..."
          cd docker/runtime
          rpm2cpio /tmp/opentenbase.rpm | cpio -idmv 2>/dev/null || true

          # Verify extraction - rpm2cpio extracts to root structure (usr/, etc/, var/)
          ls -la usr/lib/opentenbase/ 2>/dev/null || {
            echo "ERROR: Extraction failed"
            exit 1
          }

      # Set up QEMU for future multi-platform builds (arm64 etc.)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with the release version
            type=raw,value=${{ steps.version.outputs.tag }}
            # Tag "latest" for releases (not workflow_dispatch)
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker/runtime
          file: docker/runtime/Dockerfile.runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Platform" >> $GITHUB_STEP_SUMMARY
          echo "- linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY