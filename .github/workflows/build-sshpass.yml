name: Build Static sshpass Binaries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-sshpass.yml'

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build sshpass static binary (x86_64)
        run: |
          cd /tmp
          curl -fsSL https://sourceforge.net/projects/sshpass/files/sshpass/1.10/sshpass-1.10.tar.gz/download -o sshpass.tar.gz
          tar -xzf sshpass.tar.gz
          cd sshpass-1.10
          ./configure --prefix=/usr/local LDFLAGS="-static"
          make
          strip sshpass
          cp sshpass $GITHUB_WORKSPACE/binaries/sshpass-x86_64
          chmod +x $GITHUB_WORKSPACE/binaries/sshpass-x86_64
          file $GITHUB_WORKSPACE/binaries/sshpass-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshpass-x86_64
          path: binaries/sshpass-x86_64

  commit:
    needs: build-x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: sshpass-x86_64
          path: binaries/

      - name: Commit binary
        run: |
          git config user.name "CI"
          git config user.email "ci@github.com"
          git add binaries/sshpass-x86_64
          git diff --staged --quiet || git commit -m "feat: 添加 sshpass-x86_64 静态二进制"
          git push